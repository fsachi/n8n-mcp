services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    stdin_open: true # Equivale a -i
    tty: true # Equivale a -t

volumes:
  n8n_data:
    external: true
    name: n8n_data
